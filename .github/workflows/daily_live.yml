name: Daily YouTube Live

on:
  workflow_dispatch:
  schedule:
    # Run at both possible UTC equivalents of 20:00 Europe/Rome.
    # The timezone guard below allows only the correct one through.
    - cron: "0 18 * * *"
    - cron: "0 19 * * *"

permissions:
  contents: read

concurrency:
  group: daily-youtube-live
  cancel-in-progress: false

jobs:
  stream:
    if: ${{ github.event.repository.private == false }}
    name: Stream Daily Channel
    runs-on: ubuntu-latest
    timeout-minutes: 190

    steps:
      - name: Check Rome start time
        if: ${{ github.event_name == 'schedule' }}
        run: |
          ROME_HOUR=$(TZ=Europe/Rome date +%H)
          echo "Current hour in Rome: $ROME_HOUR"
          if [ "$ROME_HOUR" != "20" ]; then
            echo "Not 20:00 in Rome; stopping this duplicate DST schedule."
            exit 78
          fi

      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --upgrade "yt-dlp[default]"

      - name: Restore private files
        env:
          COOKIES_RIMAL_B64: ${{ secrets.COOKIES_RIMAL_B64 }}
          COOKIES_SANDS_B64: ${{ secrets.COOKIES_SANDS_B64 }}
          COOKIES_CRIME_B64: ${{ secrets.COOKIES_CRIME_B64 }}
          COOKIES_VOICES_B64: ${{ secrets.COOKIES_VOICES_B64 }}
          TOKEN_CHANNEL11_B64: ${{ secrets.TOKEN_CHANNEL11_B64 }}
          TOKEN_CHANNEL12_B64: ${{ secrets.TOKEN_CHANNEL12_B64 }}
          TOKEN_CHANNEL13_B64: ${{ secrets.TOKEN_CHANNEL13_B64 }}
          TOKEN_CHANNEL14_B64: ${{ secrets.TOKEN_CHANNEL14_B64 }}
        run: |
          printf '%s' "$COOKIES_RIMAL_B64" | base64 --decode > cookies_rimal.txt
          printf '%s' "$COOKIES_SANDS_B64" | base64 --decode > cookies_sands.txt
          printf '%s' "$COOKIES_CRIME_B64" | base64 --decode > cookies_crime.txt
          printf '%s' "$COOKIES_VOICES_B64" | base64 --decode > cookies_voices.txt
          printf '%s' "$TOKEN_CHANNEL11_B64" | base64 --decode > token_channel11.json
          printf '%s' "$TOKEN_CHANNEL12_B64" | base64 --decode > token_channel12.json
          printf '%s' "$TOKEN_CHANNEL13_B64" | base64 --decode > token_channel13.json
          printf '%s' "$TOKEN_CHANNEL14_B64" | base64 --decode > token_channel14.json

          test -s cookies_rimal.txt
          test -s cookies_sands.txt
          test -s cookies_crime.txt
          test -s cookies_voices.txt
          test -s token_channel11.json
          test -s token_channel12.json
          test -s token_channel13.json
          test -s token_channel14.json

      - name: Validate configuration
        run: |
          python -m json.tool config.json > /dev/null
          python -c "import json; d=json.load(open('config.json',encoding='utf-8')); print('Channels:', list(d['channels'].keys()))"

      - name: Start three-hour live stream
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          END_TIME=$((SECONDS + 10800))

          while [ "$SECONDS" -lt "$END_TIME" ]; do
            echo "Starting the next live video..."
            python daily_live.py

            EXIT_CODE=$?

            if [ "$EXIT_CODE" -ne 0 ]; then
              echo "daily_live.py failed with exit code $EXIT_CODE"
              exit "$EXIT_CODE"
            fi

            if [ "$SECONDS" -lt "$END_TIME" ]; then
              echo "Video completed. Waiting 5 seconds..."
              sleep 5
            fi
          done

          echo "Three-hour daily streaming limit completed."
