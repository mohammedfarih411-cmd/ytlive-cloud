name: YTLIVE Scheduler Bridge

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules are registered in UTC.
    # During summer in Rome, 14:07 UTC = 16:07 Europe/Rome.
    # Three guarded attempts reduce the impact of delayed cron delivery.
    - cron: "7 14 * * *"
    - cron: "17 14 * * *"
    - cron: "27 14 * * *"

permissions:
  actions: write
  contents: read

concurrency:
  group: ytlive-scheduler-bridge
  cancel-in-progress: false

jobs:
  dispatch-live:
    # Free-only guard: do not allocate a hosted runner if the repository becomes private.
    if: ${{ github.event.repository.private == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Start Daily YouTube Live if not already active
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          API="https://api.github.com/repos/$REPOSITORY"
          HEADERS=(
            --header "Accept: application/vnd.github+json"
            --header "Authorization: Bearer $GH_TOKEN"
            --header "X-GitHub-Api-Version: 2022-11-28"
          )

          ACTIVE_RUNS="$(
            curl --fail-with-body --silent --show-error --location \
              "${HEADERS[@]}" \
              "$API/actions/workflows/daily_live.yml/runs?branch=main&per_page=20" |
            python -c 'import json,sys; data=json.load(sys.stdin); print(sum(run.get("status") in {"queued","in_progress","pending","waiting","requested"} for run in data.get("workflow_runs", [])))'
          )"

          echo "Active Daily YouTube Live runs: $ACTIVE_RUNS"

          if [ "$ACTIVE_RUNS" -gt 0 ]; then
            echo "Daily YouTube Live is already active; skipping duplicate dispatch."
            exit 0
          fi

          curl --fail-with-body --silent --show-error --location \
            --request POST \
            "${HEADERS[@]}" \
            --header "Content-Type: application/json" \
            "$API/actions/workflows/daily_live.yml/dispatches" \
            --data '{"ref":"main"}'

          echo "Daily YouTube Live dispatch accepted."
