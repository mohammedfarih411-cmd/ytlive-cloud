name: Schedule Probe

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Confirm scheduled trigger
        run: |
          echo "event=${{ github.event_name }}"
          date -u